            let btn = document.getElementById('btnStashEquip');
            if(this.pcSelectedWeaponId) btn.style.display = 'inline-block';
            else btn.style.display = 'none';
        }
    }

    startRun(mode) {
        audioSys.init(); this.mode = mode; this.resetGameData();
        const u = db.users[currentUser]; this.player = new Player(0, 0, WEAPONS[u.selectedWeapon]);
        this.setUIState(null); this.state = 'PLAYING'; audioSys.stopBGM();
        if(this.mode === 'STORY') this.loadLevel();
        else { 
            this.level = new Level(0, 'SURVIVAL'); 
            const sp = this.level.getSpawnPoint();
            this.player.x = sp.x; this.player.y = sp.y; 
            this.props.push(new Prop('stash', sp.x, sp.y - 100));
        }
    }

    startTutorial() {
        this.mode = 'TUTORIAL'; this.resetGameData();
        this.player = new Player(0, 0, WEAPONS['w1']);
        this.setUIState(null); this.state = 'PLAYING';
        this.level = new Level(0, 'STORY', true);
        const spawn = this.level.getSpawnPoint(); this.player.x = spawn.x; this.player.y = spawn.y;
    }

    isPointOnProp(x, y, radius) {
        for(let p of this.props) {
            if (distance(x, y, p.x, p.y) < radius + p.radius) return true;
        }
        return false;
    }

    loadLevel() {
        this.bullets.forEach(b => this.pools.bullet.release(b)); this.particles.forEach(p => this.pools.particle.release(p));
        this.bullets = []; this.enemies = []; this.props = []; this.items = []; this.explosions = []; this.portal = null;
        this.corpses = [];
        this.level = new Level(this.levelIndex, 'STORY');
        const spawn = this.level.getSpawnPoint(); this.player.x = spawn.x; this.player.y = spawn.y;
        
        this.props.push(new Prop('stash', spawn.x, spawn.y - 100));

        const numProps = randInt(20, 40);
        for(let i=0; i<numProps; i++) {
            let p = this.level.getRandomFloorPoint(); while (distance(p.x, p.y, this.player.x, this.player.y) < 200) p = this.level.getRandomFloorPoint();
            let type = Math.random() < 0.2 ? 'barrel' : (Math.random() < 0.8 ? 'cover' : 'trap');
            this.props.push(new Prop(type, p.x, p.y));
        }

        this.level.buildFlowField(this.player.x, this.player.y);
        this.lastFlowX = this.player.x; this.lastFlowY = this.player.y;
        
        const numEnemyGroups = 6 + this.levelIndex * 3;
        const scale = 1 + this.levelIndex * 0.2;
        for (let g = 0; g < numEnemyGroups; g++) {
            let p;
            do { p = this.level.getRandomFloorPoint(); } 
            while (distance(p.x, p.y, this.player.x, this.player.y) < 400 || this.isPointOnProp(p.x, p.y, 20));

            let groupSize = randInt(3, 7);
            for(let i=0; i<groupSize; i++) {
                let r = Math.random();
                let type = 'basic';
                if (this.levelIndex >= 1 && r < 0.2) type = 'fast'; 
                else if (this.levelIndex >= 2 && r < 0.4) type = 'tank'; 
                else if (this.levelIndex >= 3 && r < 0.5) type = 'shielded'; 
                else if (this.levelIndex >= 3 && r < 0.6) type = 'summoner'; 
                else if (this.levelIndex >= 4 && r < 0.7) type = 'healer';
                
                let ox = p.x + randRange(-40, 40);
                let oy = p.y + randRange(-40, 40);
                if(!this.level.checkCollision(ox, oy, 15)) {
                    this.enemies.push(new Enemy(type, ox, oy, scale));
                }
            }
        }
    }

    triggerMutation() {
        let available = MUTATIONS.filter(m => !this.player.mutations.includes(m.id));
        if(available.length === 0) {
            if(this.mode === 'STORY') { this.levelIndex++; this.loadLevel(); } else { this.waveTimer = 3; }
            return;
        }

        this.state = 'MUTATION'; this.setUIState('mutationScreen');
        const cont = document.getElementById('mutationsContainer'); cont.innerHTML = '';
        let choices = [];
        
        for(let i=0; i<3; i++) { 
            if(available.length === 0) break;
            let idx = randInt(0, available.length); 
            choices.push(available.splice(idx,1)[0]); 
        }

        choices.forEach(m => {
            const div = document.createElement('div'); div.className = 'mutation-card'; div.innerHTML = `<h3>${m.name}</h3>`;
            div.onclick = () => { 
                m.apply(this.player);
                this.player.mutations.push(m.id);
                this.setUIState(null); this.state = 'PLAYING';
                if(this.mode === 'STORY') {
                    this.levelIndex++; this.loadLevel();
                } else {
                    this.waveTimer = 3; 
                }
            };
            cont.appendChild(div);
        });
    }

    spawnSurvivalWave() {
        this.waveTimer = 10;
        
        if (this.wave > 1 && this.wave % randInt(3, 6) === 0) {
            const numProps = randInt(5, 15);
            for(let i=0; i<numProps; i++) {
                let p = this.level.getRandomFloorPoint(); 
                if(distance(p.x, p.y, this.player.x, this.player.y) > 200) {
                    this.props.push(new Prop('cover', p.x, p.y));
                }
            }
        }

        if (this.wave % 7 === 0) {
            let bossCount = Math.floor(this.wave / 7);
            const scale = 1 + (bossCount * 0.25);
            let p; do { p = this.level.getRandomFloorPoint(); } while (distance(p.x, p.y, this.player.x, this.player.y) < 400 || this.isPointOnProp(p.x, p.y, 30));
            this.enemies.push(new Enemy('boss', p.x, p.y, scale)); 
            audioSys.sfxBossSpawn();
            audioSys.startBGM('boss');
        } else {
            const scale = 1 + this.wave * 0.15;
            const numGroups = 4 + Math.floor(this.wave / 2);
            for (let g = 0; g < numGroups; g++) {
                let p; do { p = this.level.getRandomFloorPoint(); } while (distance(p.x, p.y, this.player.x, this.player.y) < 400 || this.isPointOnProp(p.x, p.y, 20));
                let groupSize = randInt(3, 7);
                for(let i=0; i<groupSize; i++) {
                    let type = 'basic', r = Math.random();
                    if (this.wave >= 2 && r < 0.2) type = 'fast'; 
                    else if (this.wave >= 4 && r < 0.4) type = 'tank'; 
                    else if (this.wave >= 5 && r < 0.5) type = 'shielded';
                    else if (this.wave >= 6 && r < 0.6) type = 'summoner';
                    else if (this.wave >= 6 && r < 0.7) type = 'healer';
                    
                    let ox = p.x + randRange(-40, 40);
                    let oy = p.y + randRange(-40, 40);
                    if(!this.level.checkCollision(ox, oy, 15)) {
                        this.enemies.push(new Enemy(type, ox, oy, scale));
                    }
                }
            }
        }
        this.wave++;
    }

    togglePause() {
        if(this.state === 'PLAYING') { 
            let mutList = document.getElementById('pauseMutationsList');
            mutList.innerHTML = '<strong>Habilidades:</strong><br>';
            if(this.player.mutations.length === 0) mutList.innerHTML += 'Ninguna';
            else {
                this.player.mutations.forEach(mId => {
                    let mutDef = MUTATIONS.find(m => m.id === mId);
                    if(mutDef) mutList.innerHTML += `- ${mutDef.name}<br>`;
                });
            }
            this.state = 'PAUSED'; 
            this.setUIState('pauseScreen'); 
        }
        else if (this.state === 'PAUSED') { this.state = 'PLAYING'; this.setUIState(null); }
    }

    triggerScreenShake(mag) { this.shakeTime = 0.15; this.shakeMagnitude = mag; }
    spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) { let p = this.pools.particle.get(); p.init(x, y, color); this.particles.push(p); } }
    showDmgText(x, y, text, color) { let t = this.pools.dmgText.get(); t.init(x, y, text, color); this.dmgTexts.push(t); }

    endRun(isWin) {
        if (this.mode === 'TUTORIAL') {
            db.users[currentUser].tutorialDone = true;
            saveDB();
            this.updateMenuUI(); this.setUIState('menuScreen'); this.state = 'MENU';
            audioSys.startBGM('menu');
            return;
        }
        this.state = isWin ? 'VICTORY' : 'GAMEOVER'; const u = db.users[currentUser]; u.coins += this.runCoins; audioSys.stopBGM();
        if (isWin) { u.wins++; document.getElementById('vicScore').innerText = this.score; document.getElementById('vicCoins').innerText = this.runCoins; this.setUIState('victoryScreen'); } 
        else { u.deaths++; document.getElementById('goContext').innerText = `Modo: ${this.mode} | ${this.mode==='STORY' ? 'Nivel: '+(this.levelIndex+1) : 'Oleada: '+(this.wave-1)}`; document.getElementById('goScore').innerText = this.score; document.getElementById('goCoins').innerText = this.runCoins; this.setUIState('gameOverScreen'); }
        if(this.mode === 'STORY') checkHighscore(currentUser, this.score);
        saveDB(); audioSys.startBGM('menu');
    }

    handleTutorialStep() {
        if (this.tutorialStep === 0) {
            if (this.tutorialMoved) this.tutorialStep = 1;
        } else if (this.tutorialStep === 1) {
            if (this.tutorialFired && this.tutorialReloaded) this.tutorialStep = 2;
        } else if (this.tutorialStep === 2) {
            if (this.tutorialDashed) {
                this.tutorialStep = 3;
                this.items.push(new Item('coin', this.player.x - 50, this.player.y));
                this.items.push(new Item('heal', this.player.x + 50, this.player.y));
                this.player.hp = 50; 
            }
        } else if (this.tutorialStep === 3) {
            if (this.items.length === 0) {
                this.tutorialStep = 4;
            }
        } else if (this.tutorialStep === 4) {
            if (!this.tutorialCombatStarted) {
                this.tutorialCombatStarted = true;
                for(let i=0; i<3; i++) {
                    let e = new Enemy('basic', this.player.x + randRange(-100, 100), this.player.y - 150 + randRange(-50,50), 1);
                    e.hp = 10; e.maxHp = 10; e.damage = 2; e.speed = 40;
                    this.enemies.push(e);
                }
            } else if (this.enemies.length === 0) {
                this.tutorialStep = 5;
            }
        } else if (this.tutorialStep === 5) {
            this.endRun(true);
        }
    }

    update(dt) {
        if (this.state === 'INTRO') {
            this.introTimer -= dt;
            if (this.introTimer <= 0) {
                this.startTutorial();
            }
            return;
        }

        if (this.state !== 'PLAYING') return;
        this.time += dt * 1000; if (this.shakeTime > 0) this.shakeTime -= dt;
        
        if (this.mode === 'TUTORIAL') this.handleTutorialStep();

        this.spatialGrid.clear(); this.enemies.forEach(e => { if(e.active) this.spatialGrid.add(e); });

        this.flowTimer -= dt; 
        if(this.flowTimer <= 0) { 
            let distMoved = distance(this.player.x, this.player.y, this.lastFlowX || 0, this.lastFlowY || 0);
            if (distMoved > 40 || !this.lastFlowX) {
                if(this.level) this.level.buildFlowField(this.player.x, this.player.y); 
                this.lastFlowX = this.player.x; this.lastFlowY = this.player.y;
            }
            this.flowTimer = 0.25; 
        }

        this.nearStash = false;
        let distToStash = 9999;
        this.props.forEach(p => {
            if (p.type === 'stash') {
                let d = distance(this.player.x, this.player.y, p.x, p.y);
                if (d < 60) {
                    this.nearStash = true;
                    distToStash = d;
                }
            }
        });
        if (isMobileMode) {
            let intBtn = document.getElementById('mobileInteract');
            if(this.nearStash) intBtn.style.display = 'flex';
            else intBtn.style.display = 'none';
        }

        if(!this.player.active) {
            this.player.deadTimer += dt;
            if(this.player.deadTimer > 2.0) {
                this.endRun(false);
                return;
            }
        } else {
            this.player.update(dt, this, this.level);
            let camZoom = isMobileMode ? 1.5 : 1;
            this.camera.x = this.player.x - (CANVAS_WIDTH / camZoom) / 2; 
            this.camera.y = this.player.y - (CANVAS_HEIGHT / camZoom) / 2;
        }

        if(this.mode === 'SURVIVAL') { 
            if(this.enemies.length === 0) { 
                this.waveTimer -= dt; 
                if(this.waveTimer <= 0) {
                    if(this.wave > 1 && (this.wave - 1) % randInt(3,6) === 0 && !this.mutationShownForWave[this.wave]) {
                        this.mutationShownForWave[this.wave] = true;
                        this.triggerMutation();
                    } else {
                        this.spawnSurvivalWave(); 
                    }
                } 
            } 
        }

        for (let i = this.bullets.length - 1; i >= 0; i--) {
            let b = this.bullets[i]; b.update(dt, this.level, this);
            if (b.active && !b.explosive) {
                if (b.isPlayer) {
                    let nearby = this.spatialGrid.query(b.x, b.y, b.radius + 30);
                    for (let e of nearby) { if (e.active && distance(b.x, b.y, e.x, e.y) < b.radius + e.radius) { e.takeDamage(b.damage, this); b.active = false; break; } }
                } else { if (distance(b.x, b.y, this.player.x, this.player.y) < b.radius + this.player.radius) { this.player.takeDamage(b.damage, this); b.active = false; } }
            } else if (b.active && b.explosive) {
                if (b.isPlayer) { let nearby = this.spatialGrid.query(b.x, b.y, b.radius+30); for (let e of nearby) { if (e.active && distance(b.x, b.y, e.x, e.y) < b.radius + e.radius) { b.active = false; this.explosions.push(new Explosion(b.x, b.y, b.expRadius, b.damage, true, b.color)); break; } } } 
                else { if (distance(b.x, b.y, this.player.x, this.player.y) < b.radius + this.player.radius) { b.active = false; this.explosions.push(new Explosion(b.x, b.y, b.expRadius, b.damage, false, b.color)); } }
            }
            if (!b.active) { this.pools.bullet.release(b); this.bullets.splice(i, 1); }
        }

        for (let i = this.explosions.length - 1; i >= 0; i--) { this.explosions[i].update(dt, this); if (!this.explosions[i].active) this.explosions.splice(i, 1); }
        for (let i = this.props.length - 1; i >= 0; i--) { this.props[i].update(dt, this); if(!this.props[i].active) this.props.splice(i,1); }

        let activeEnemies = 0;
        for (let i = this.enemies.length - 1; i >= 0; i--) {
            let e = this.enemies[i]; e.update(dt, this, this.level);
            if (distance(e.x, e.y, this.player.x, this.player.y) < e.radius + this.player.radius) this.player.takeDamage(e.damage, this);
            if (!e.active) this.enemies.splice(i, 1); else activeEnemies++;
        }

        if (this.mode === 'STORY' && activeEnemies === 0) {
            if (this.levelIndex === this.targetLevels - 1 && !this.bossSpawned) {
                this.bossSpawned = true; let p; do { p = this.level.getRandomFloorPoint(); } while(distance(p.x, p.y, this.player.x, this.player.y) < 300 || this.isPointOnProp(p.x, p.y, 30));
                this.enemies.push(new Enemy('boss', p.x, p.y, 1 + this.levelIndex * 0.2)); 
                audioSys.sfxBossSpawn();
                audioSys.startBGM('boss');
            } else if (!this.portal && (this.levelIndex < this.targetLevels - 1 || this.bossSpawned)) {
                let px = this.player.x, py = this.player.y;
                let valid = false, prx, pry;
                for(let k=0; k<30; k++){
                    let ang = Math.random()*Math.PI*2; let d = randRange(150, 350);
                    prx = px + Math.cos(ang)*d; pry = py + Math.sin(ang)*d;
                    if(!this.level.checkCollision(prx, pry, 20)) { valid = true; break; }
                }
                if(!valid) { let fall = this.level.getSpawnPoint(); prx = fall.x; pry = fall.y; }
                this.portal = new Portal(prx, pry); audioSys.sfxPortal();
            }
        }

        if (this.portal && distance(this.player.x, this.player.y, this.portal.x, this.portal.y) < this.player.radius + this.portal.radius) {
            if (this.levelIndex === this.targetLevels - 1) { this.endRun(true); return; }
            if (this.levelIndex === this.nextMutationLevel) { 
                this.nextMutationLevel = this.levelIndex + randInt(2, 5);
                this.triggerMutation(); 
            } else { 
                this.levelIndex++; this.loadLevel(); 
            }
            return;
        }

        for (let i = this.items.length - 1; i >= 0; i--) {
            let p = this.items[i];
            p.update(dt);
            if (distance(p.x, p.y, this.player.x, this.player.y) < p.radius + this.player.radius) {
                if(p.type === 'coin') { this.runCoins += 10; audioSys.sfxCoin(); }
                if(p.type === 'heal') this.player.hp = Math.min(this.player.maxHp, this.player.hp + 20);
                this.items.splice(i, 1);
            } else if(p.lifeTime <= 0) {
                this.items.splice(i, 1);
            }
        }

        for (let i = this.corpses.length - 1; i >= 0; i--) {
            this.corpses[i].life -= dt;
            if(this.corpses[i].life <= 0) this.corpses.splice(i, 1);
        }

        for (let i = this.particles.length - 1; i >= 0; i--) { this.particles[i].update(dt); if (!this.particles[i].active) { this.pools.particle.release(this.particles[i]); this.particles.splice(i, 1); } }
        for (let i = this.customParticles.length - 1; i >= 0; i--) { this.customParticles[i].life -= dt; if(this.customParticles[i].life <= 0) this.customParticles.splice(i, 1); }
        for (let i = this.dmgTexts.length - 1; i >= 0; i--) { this.dmgTexts[i].update(dt); if (!this.dmgTexts[i].active) { this.pools.dmgText.release(this.dmgTexts[i]); this.dmgTexts.splice(i, 1); } }
        
        this.prevMouseDown = this.input.mouse.down;
        for(let k in this.input.keys) this.prevKeys[k] = this.input.keys[k];
    }

    draw() {
        this.ctx.fillStyle = '#050508'; this.ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        if (this.state === 'LOGIN' || this.state === 'MENU' || this.state === 'STORE') return;

        if (this.state === 'INTRO') {
            this.ctx.fillStyle = '#000';
            this.ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            let alpha = 1;
            if (this.introTimer > 5.5) alpha = 7 - this.introTimer;
            else if (this.introTimer < 1.5) alpha = this.introTimer;
            
            this.ctx.globalAlpha = Math.min(1, Math.max(0, alpha));
            this.ctx.textAlign = 'center';
            this.ctx.fillStyle = '#00ffcc';
            this.ctx.font = 'bold 60px Courier New';
            this.ctx.fillText("NEON ARMOR", CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
            
            this.ctx.fillStyle = '#fff';
            this.ctx.font = '20px Courier New';
            this.ctx.fillText("Creado por: maruyanx, nigrumdrac", CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 50);
            
            this.ctx.globalAlpha = 1.0;
            this.ctx.textAlign = 'left';
            return;
        }

        this.ctx.imageSmoothingEnabled = false;
        this.ctx.save();
        
        let camZoom = isMobileMode ? 1.5 : 1;
        
        if (this.shakeTime > 0) this.ctx.translate((Math.random()-0.5)*this.shakeMagnitude, (Math.random()-0.5)*this.shakeMagnitude);
        
        this.ctx.scale(camZoom, camZoom);
        this.ctx.translate(-this.camera.x, -this.camera.y);

        if (this.level) this.level.draw(this.ctx, this.camera, camZoom);
        if (this.portal) this.portal.draw(this.ctx, 1/60);
        
        this.corpses.forEach(c => {
            let spriteName = 'enemy_' + c.type + '_dead';
            if(c.type === 'boss') spriteName = 'enemy_boss_dead';
            let sprite = window.renderedSprites[spriteName];
            if (sprite) {
                this.ctx.save();
                this.ctx.globalAlpha = Math.min(1, c.life / 2);
                this.ctx.translate(c.x, c.y);
                this.ctx.scale(c.facingLeft ? -1 : 1, 1);
                let rad = ENEMY_CONFIGS[c.type].radius;
                let sc = c.type === 'boss' ? rad*3 : rad*2.5;
                this.ctx.drawImage(sprite, -sc/2, -sc/2, sc, sc);
                this.ctx.restore();
            }
        });

        this.props.forEach(p => {
            p.draw(this.ctx);
            if(p.type === 'stash' && this.nearStash && !isMobileMode) {
                this.ctx.fillStyle = '#ffaa00';
                this.ctx.font = 'bold 12px Courier New';
                this.ctx.textAlign = 'center';
                this.ctx.fillText("PRESIONE E", p.x, p.y - 30);
                this.ctx.textAlign = 'left';
            }
        });
        this.items.forEach(p => p.draw(this.ctx, this.time));
        this.enemies.forEach(e => e.draw(this.ctx, this.time));
        this.bullets.forEach(b => b.draw(this.ctx));
        this.explosions.forEach(e => e.draw(this.ctx));
        this.particles.forEach(p => p.draw(this.ctx));
        
        this.customParticles.forEach(p => {
            if(p.type === 'laser') {
                this.ctx.strokeStyle = '#ff0000'; this.ctx.lineWidth = 15 * (p.life/0.5); this.ctx.beginPath(); this.ctx.moveTo(p.x, p.y);
                this.ctx.lineTo(p.x + Math.cos(p.angle)*1500, p.y + Math.sin(p.angle)*1500); this.ctx.stroke();
            }
        });

        this.player.draw(this.ctx, this.time);
        
        if (this.mode === 'TUTORIAL') {
            this.ctx.textAlign = 'center';
            this.ctx.fillStyle = '#fff';
            this.ctx.font = 'bold 16px Courier New';
            let tutText = "";
            if (this.tutorialStep === 0) tutText = isMobileMode ? "Usa el joystick izquierdo para moverte" : "Usa W A S D para moverte";
            else if (this.tutorialStep === 1) tutText = isMobileMode ? "Usa el botón X o joystick der. para disparar, R para recargar" : "Apunta y usa Click para disparar, R para recargar";
            else if (this.tutorialStep === 2) tutText = isMobileMode ? "Usa el botón D para hacer Dash (esquivar)" : "Usa SHIFT para hacer Dash (esquivar y atravesar cosas)";
            else if (this.tutorialStep === 3) tutText = "Recoge los ítems para recuperar HP o ganar créditos";
            else if (this.tutorialStep === 4) tutText = "¡Elimina a todos los objetivos!";
            else if (this.tutorialStep === 5) tutText = "¡Tutorial completado!";
            
            this.ctx.fillText(tutText, this.player.x, this.player.y - 40);
            this.ctx.textAlign = 'left';
        }

        this.dmgTexts.forEach(t => t.draw(this.ctx));

        this.ctx.restore();

        if (this.state === 'PLAYING' || this.state === 'PAUSED') { this.drawHUD(); this.drawMinimap(); }
        if (this.state === 'PAUSED') { this.ctx.fillStyle = 'rgba(0,0,0,0.5)'; this.ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); }
    }

    drawHUD() {
        const ctx = this.ctx; ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(10, 10, 300, 130);
        
        ctx.fillStyle = '#fff'; ctx.font = '16px Courier New'; ctx.fillText(`HP: ${Math.ceil(this.player.hp)}/${this.player.maxHp}`, 20, 30);
        ctx.fillStyle = '#550000'; ctx.fillRect(20, 40, 260, 12); ctx.fillStyle = '#00ffcc'; ctx.fillRect(20, 40, 260 * (Math.max(0, this.player.hp) / this.player.maxHp), 12);

        ctx.fillStyle = '#fff'; ctx.fillText(`DASH`, 20, 75); ctx.fillStyle = '#333'; ctx.fillRect(70, 65, 80, 12);
        if(this.player.dashCooldownTimer <= 0) { ctx.fillStyle = '#0f0'; ctx.fillRect(70, 65, 80, 12); } 
        else { ctx.fillStyle = '#f00'; ctx.fillRect(70, 65, 80 * (1 - this.player.dashCooldownTimer/this.player.dashCooldown), 12); }
        
        ctx.fillStyle = '#fff'; ctx.fillText(`AMMO: ${this.player.weapon.ammo}/${this.player.weapon.config.magSize}`, 20, 105);
        ctx.fillStyle = '#333'; ctx.fillRect(20, 115, 260, 12);
        if(this.player.weapon.reloading) {
            let prog = this.player.weapon.reloadTimer / this.player.weapon.config.reloadTime;
            ctx.fillStyle = '#ffaa00'; ctx.fillRect(20 + 260*0.5, 115, 260*0.15, 12); 
            ctx.fillStyle = '#fff'; ctx.fillRect(20 + 260*prog, 110, 4, 22); 
        } else { ctx.fillStyle = '#00ffcc'; ctx.fillRect(20, 115, 260 * (this.player.weapon.ammo / this.player.weapon.config.magSize), 12); }

        ctx.fillStyle = 'var(--gold-color)'; ctx.fillText(`Cr: ${this.runCoins}`, 170, 75);
        ctx.textAlign = 'right'; ctx.font = '24px Courier New';
        if(this.mode === 'STORY') { ctx.fillStyle = '#00ffcc'; ctx.fillText(`Nv: ${this.levelIndex + 1}/${this.targetLevels}`, CANVAS_WIDTH - 20, 40); ctx.fillStyle = '#fff'; ctx.fillText(`Pts: ${this.score}`, CANVAS_WIDTH - 20, 70); } 
        else if(this.mode === 'SURVIVAL') { ctx.fillStyle = '#ff0055'; ctx.fillText(`Oleada: ${this.wave - 1}`, CANVAS_WIDTH - 20, 40); if(this.enemies.length === 0 && this.waveTimer > 0) { ctx.fillStyle = '#fff'; ctx.fillText(`Sig: ${Math.ceil(this.waveTimer)}s`, CANVAS_WIDTH - 20, 70); } }
        else if(this.mode === 'TUTORIAL') { ctx.fillStyle = '#00ffcc'; ctx.fillText(`TUTORIAL`, CANVAS_WIDTH - 20, 40); }
        ctx.textAlign = 'left';
    }

    drawMinimap() {
        if(!this.level || this.mode === 'TUTORIAL') return;
        let size = 150;
        let mapX = CANVAS_WIDTH - size - 20;
        let mapY = CANVAS_HEIGHT - size - 20;

        if (isMobileMode) {
            size = 220;
            mapX = 20;
            mapY = 160;
        }

        const scale = size / (this.level.cols * this.level.tileSize);
        const ctx = this.ctx;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.fillRect(mapX, mapY, size, size); ctx.strokeStyle = '#00ffcc'; ctx.strokeRect(mapX, mapY, size, size);

        for (let y = 0; y < this.level.rows; y++) {
            for (let x = 0; x < this.level.cols; x++) {
                if (this.level.grid[y][x] === 1) { ctx.fillStyle = 'rgba(50, 50, 70, 0.8)'; ctx.fillRect(mapX + x * this.level.tileSize * scale, mapY + y * this.level.tileSize * scale, this.level.tileSize * scale, this.level.tileSize * scale); }
            }
        }
        if(this.portal) { ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(mapX + this.portal.x * scale, mapY + this.portal.y * scale, 3, 0, Math.PI*2); ctx.fill(); }
        this.items.forEach(item => { ctx.fillStyle = item.type === 'coin' ? '#ffd700' : '#0f0'; ctx.beginPath(); ctx.arc(mapX + item.x * scale, mapY + item.y * scale, 1.5, 0, Math.PI*2); ctx.fill(); });
        this.enemies.forEach(e => { ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(mapX + e.x * scale, mapY + e.y * scale, 2, 0, Math.PI*2); ctx.fill(); });
        ctx.fillStyle = '#00ffcc'; ctx.beginPath(); ctx.arc(mapX + this.player.x * scale, mapY + this.player.y * scale, 3, 0, Math.PI*2); ctx.fill();
    }

    loop(timestamp) {
        let dt = (timestamp - this.lastTime) / 1000; if (dt > 0.1) dt = 0.1; this.lastTime = timestamp;
        this.update(dt); this.draw(); requestAnimationFrame((t) => this.loop(t));
    }
}

window.onload = () => { initSprites(); const game = new Game(); requestAnimationFrame((t) => { game.lastTime = t; game.loop(t); }); };
</script>
