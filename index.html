<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON ARMOR - COMPLETE EDITION</title>
    <style>
        :root {
            --bg-color: #0d0d12; --accent-color: #00ffcc; --danger-color: #ff0055;
            --gold-color: #ffd700; --text-color: #ffffff; --ui-bg: rgba(13, 13, 18, 0.95);
        }
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            user-select: none; touch-action: none;
        }

        #appWrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        body.pc-mode #appWrapper { flex-direction: row; justify-content: center; align-items: center; gap: 20px; background-color: var(--bg-color); }
        body.mobile-mode #appWrapper { flex-direction: column; background-color: #8b8b8b; }

        #topScreen {
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        body.pc-mode #topScreen { flex: 0 0 auto; width: 1024px; height: 768px; max-width: 100%; max-height: 100%; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        body.mobile-mode #topScreen { flex: 0 0 50vh; width: 100%; border-bottom: 4px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        #gameContainer { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 20; }
        
        .screen { display: none; pointer-events: auto; }
        .screen.active { display: block !important; }

        body.pc-mode .screen { background: var(--ui-bg); padding: 30px; border: 2px solid var(--accent-color); border-radius: 8px; text-align: center; box-shadow: 0 0 15px var(--accent-color); max-width: 800px; max-height: 90%; overflow-y: auto; }
        body.mobile-mode .screen { background: var(--ui-bg); padding: 15px; border: 2px solid var(--accent-color); border-radius: 0; text-align: center; width: 100%; height: 100%; box-sizing: border-box; overflow-y: auto; }
        
        h1 { margin-top: 0; color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); }
        h2 { color: var(--danger-color); margin-top: 0; }
        h3 { color: var(--gold-color); margin-bottom: 5px; }
        p { margin: 5px 0; }
        
        body.pc-mode h1 { font-size: 2em; }
        body.mobile-mode h1 { font-size: 1.5em; }
        body.mobile-mode h2 { font-size: 1.2em; }
        body.mobile-mode h3 { font-size: 1em; }
        body.mobile-mode p { font-size: 0.9em; }

        input { padding: 10px; font-size: 1em; font-family: inherit; background: #000; border: 1px solid var(--accent-color); color: #fff; width: 80%; margin-bottom: 15px; text-align: center; box-sizing: border-box; }
        button { background: var(--accent-color); color: #000; border: none; padding: 12px 24px; font-size: 1em; font-weight: bold; cursor: pointer; border-radius: 4px; font-family: inherit; margin: 5px; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        button.danger { background: var(--danger-color); color: #fff; }

        body.mobile-mode button { padding: 10px 15px; font-size: 0.9em; margin: 4px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stats-bar { display: flex; justify-content: space-around; background: #222; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; flex-wrap: wrap; gap: 10px; }
        .stats-bar span { color: var(--accent-color); }

        body.mobile-mode .menu-grid { gap: 8px; margin-bottom: 15px; }
        body.mobile-mode .stats-bar { padding: 8px; margin-bottom: 15px; gap: 5px; font-size: 0.8em; }

        .store-grid { display: grid; gap: 15px; margin-top: 20px; text-align: left; }
        body.pc-mode .store-grid { grid-template-columns: repeat(3, 1fr); max-height: 50vh; overflow-y: auto; padding: 10px; }
        body.mobile-mode .store-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        .weapon-card { border: 2px solid #555; padding: 15px; background: #111; cursor: pointer; }
        .weapon-card.unlocked { border-color: var(--accent-color); }
        .weapon-card.highlighted { border-color: #fff; box-shadow: 0 0 15px #fff; background: #333; transform: scale(1.02); transition: 0.1s; }
        .weapon-card.selected { box-shadow: 0 0 10px var(--accent-color); background: #1a2a2a; }
        .weapon-card h4 { margin: 0 0 5px 0; color: #fff; }
        .weapon-card p { margin: 2px 0; color: #aaa; }
        .buy-btn-hint { color: var(--gold-color); font-weight: bold; font-size: 0.8em; margin-top: 5px; display: block; }

        body.mobile-mode .weapon-card { padding: 10px; }
        body.mobile-mode .weapon-card h4 { font-size: 1em; margin-bottom: 2px; }
        body.mobile-mode .weapon-card p { font-size: 0.75em; }

        .mutations-grid { display: grid; gap: 15px; margin-top: 20px; }
        body.pc-mode .mutations-grid { grid-template-columns: 1fr 1fr 1fr; }
        body.mobile-mode .mutations-grid { grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
        .mutation-card { border: 1px solid var(--accent-color); padding: 20px; background: #111; cursor: pointer; transition: 0.2s; }
        .mutation-card:hover { background: #222; transform: scale(1.05); box-shadow: 0 0 15px var(--accent-color); }
        body.mobile-mode .mutation-card { padding: 15px; }

        #bottomSection { flex: 1; display: flex; flex-direction: column; position: relative; background: #d0d0d0; background-image: linear-gradient(#d0d0d0, #a0a0a0); }
        body.pc-mode #bottomSection { display: none; }

        #controlArea { flex: 1; position: relative; }
        #gameplayControls, #storeControls { position: absolute; width: 100%; height: 100%; }
        #storeControls { display: none; }

        .gb-btn { position: absolute; background: #ff0055; color: #fff; font-weight: bold; border: 2px solid #333; box-shadow: 2px 4px 0 #333; display: flex; justify-content: center; align-items: center; text-shadow: 1px 1px 0 #000; }
        .gb-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #333; }
        .round { border-radius: 50%; }
        .lg { width: 65px; height: 65px; font-size: 24px; }
        .md { width: 45px; height: 45px; font-size: 18px; }
        .sm { width: 45px; height: 18px; font-size: 10px; border-radius: 10px; background: #444; color: #aaa; border: 2px solid #222; }

        #joystickBase { position: absolute; left: 5%; top: 50%; transform: translateY(-50%); width: 130px; height: 130px; background: rgba(0,0,0,0.1); border: 3px solid #777; border-radius: 50%; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        #joystickStick { position: absolute; width: 50px; height: 50px; background: #333; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); box-shadow: 2px 4px 0 #111; }
        
        #mobileShoot { bottom: 15%; right: 10%; background: #aa0033; }
        #mobilePause { bottom: 45%; right: 5%; transform: rotate(-20deg); }
        #mobilePause:active { transform: rotate(-20deg) translateY(4px); }
        #mobileReload { bottom: 30%; right: 28%; background: #00aa55; }
        #mobileDash { bottom: 10%; right: 42%; background: #0055aa; }

        #dpad { position: absolute; left: 10%; top: 50%; transform: translateY(-50%); width: 120px; height: 120px; }
        .dpad-btn { position: absolute; background: #333; color: #fff; border: 2px solid #111; width: 40px; height: 40px; font-size: 18px; display: flex; justify-content: center; align-items: center; box-shadow: 2px 2px 0 #111; padding:0; margin:0; border-radius: 4px; }
        .dpad-btn:active { transform: translate(2px, 2px); box-shadow: none; }
        #btnUp { left: 40px; top: 0; }
        #btnDown { left: 40px; bottom: 0; }
        #btnLeft { left: 0; top: 40px; }
        #btnRight { right: 0; top: 40px; }
        #btnStoreBuy { bottom: 25%; right: 10%; background: #aa0033; }
        #btnStoreBack { bottom: 15%; right: 35%; background: #444; }

        #leaderboardPanel, #leaderboardPanelMobile { background: #111; border: 2px solid var(--accent-color); padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: center; }
        h2 { color: var(--accent-color); font-size: 1.2em; margin-top: 0; }
        .lb-entry { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.9em; }
        .lb-entry span:nth-child(2) { color: var(--gold-color); }

        body.pc-mode #leaderboardPanel { width: 250px; height: 768px; border-radius: 8px; }
        body.pc-mode #leaderboardPanelMobile { display: none; }
        
        body.mobile-mode #leaderboardPanel { display: none; }
        body.mobile-mode #leaderboardPanelMobile { flex: 0 0 80px; border-radius: 0; border-width: 3px 0 0 0; padding: 5px 15px; }
        body.mobile-mode #leaderboardPanelMobile h2 { font-size: 1em; margin: 2px 0; }
        body.mobile-mode .lb-entry { padding: 2px 0; font-size: 0.8em; }
    </style>
</head>
<body>
<div id="appWrapper">
    <div id="topScreen">
        <div id="gameContainer">
            <canvas id="gameCanvas" width="1024" height="768"></canvas>
            <div id="uiLayer">
                <div id="loginScreen" class="screen active">
                    <h1>NEON ARMOR</h1><p>Identificación</p>
                    <input type="text" id="usernameInput" placeholder="Usuario" maxlength="12"><br>
                    <input type="password" id="passwordInput" placeholder="Contraseña"><br>
                    <button id="btnLogin">Acceder</button>
                </div>
                <div id="menuScreen" class="screen">
                    <h1>NEON ARMOR</h1>
                    <div class="stats-bar">
                        <div>Piloto: <span id="uiUser"></span></div>
                        <div>Wins: <span id="uiWins"></span></div>
                        <div>Kills: <span id="uiDeaths"></span></div>
                        <div>Cr: <span id="uiCoins" style="color:var(--gold-color)"></span></div>
                    </div>
                    <div class="menu-grid">
                        <button id="btnStory">HISTORIA</button>
                        <button id="btnSurvival" class="danger">SUPERVIVENCIA</button>
                        <button id="btnStore">ARMERÍA</button>
                        <button id="btnSound">Sonido: <span id="soundStatus">ON</span></button>
                    </div>
                    <button id="btnLogout" style="background:#444; color:#fff;">Cerrar Sesión</button>
                </div>
                <div id="storeScreen" class="screen">
                    <h2>ARMERÍA</h2><p>Créditos: <span id="storeCoins" style="color:var(--gold-color)"></span></p>
                    <div class="store-grid" id="storeContainer"></div>
                    <button id="btnBackToMenuPC" style="margin-top: 20px; display: none;">Volver al Menú</button>
                </div>
                <div id="mutationScreen" class="screen">
                    <h2>MUTACIÓN</h2><p>Selecciona mejora:</p>
                    <div class="mutations-grid" id="mutationsContainer"></div>
                </div>
                <div id="pauseScreen" class="screen">
                    <h2>PAUSADO</h2>
                    <button id="btnResume">Continuar</button>
                    <button id="btnPauseSound">Sonido: <span id="pauseSoundStatus">ON</span></button>
                    <button id="btnQuit" class="danger">Abandonar</button>
                </div>
                <div id="gameOverScreen" class="screen">
                    <h2>FIN DE TRANSMISIÓN</h2><p id="goContext"></p>
                    <p>Puntuación: <span id="goScore"></span></p><p>Créditos: <span id="goCoins" style="color:var(--gold-color)"></span></p>
                    <button id="btnReturnDead">Volver</button>
                </div>
                <div id="victoryScreen" class="screen">
                    <h2 style="color: var(--gold-color)">¡TRONO ALCANZADO!</h2>
                    <p>Puntuación final: <span id="vicScore"></span></p><p>Créditos: <span id="vicCoins" style="color:var(--gold-color)"></span></p>
                    <button id="btnReturnWin">Volver</button>
                </div>
            </div>
        </div>
    </div>

    <div id="bottomSection">
        <div id="controlArea">
            <div id="gameplayControls">
                <div id="joystickBase"><div id="joystickStick"></div></div>
                <button id="mobilePause" class="gb-btn sm">PAUSE</button>
                <button id="mobileShoot" class="gb-btn round lg">X</button>
                <button id="mobileReload" class="gb-btn round md">R</button>
                <button id="mobileDash" class="gb-btn round md">D</button>
            </div>
            <div id="storeControls">
                <div id="dpad">
                    <button id="btnUp" class="dpad-btn">▲</button>
                    <button id="btnLeft" class="dpad-btn">◄</button>
                    <button id="btnRight" class="dpad-btn">►</button>
                    <button id="btnDown" class="dpad-btn">▼</button>
                </div>
                <button id="btnStoreBuy" class="gb-btn round lg">BUY</button>
                <button id="btnStoreBack" class="gb-btn round md">BACK</button>
            </div>
        </div>
        <div id="leaderboardPanelMobile">
            <h2>TOP PILOTOS</h2>
            <div id="lbContainerMobile"></div>
        </div>
    </div>
    <div id="leaderboardPanel">
        <h2>TOP PILOTOS</h2>
        <div id="lbContainerPC"></div>
    </div>
</div>

<script>
const CANVAS_WIDTH = 1024, CANVAS_HEIGHT = 768, TILE_SIZE = 64;

const WEAPONS = {
    w1: { id: 'w1', name: 'Pistola Básica', damage: 8, cost: 0, fireRate: 350, speed: 600, spread: 0.04, auto: false, color: '#aaa', magSize: 12, reloadTime: 1.2, type: 'pistol' },
    w2: { id: 'w2', name: 'Revólver', damage: 15, cost: 100, fireRate: 400, speed: 700, spread: 0.02, auto: false, color: '#0f0', magSize: 6, reloadTime: 1.5, type: 'pistol' },
    w3: { id: 'w3', name: 'Subfusil', damage: 5, cost: 200, fireRate: 100, speed: 700, spread: 0.1, auto: true, color: '#0ff', magSize: 30, reloadTime: 1.8, type: 'rifle' },
    w4: { id: 'w4', name: 'Escopeta Ligera', damage: 6, cost: 350, fireRate: 900, speed: 500, spread: 0.3, auto: false, color: '#ffaa00', magSize: 4, reloadTime: 2.0, type: 'shotgun', bullets: 5 },

    w8: { id: 'w8', name: 'Francotirador', damage: 40, cost: 1200, fireRate: 1200, speed: 1500, spread: 0.005, auto: false, color: '#ff5500', magSize: 5, reloadTime: 2.8, type: 'sniper' },
    w9: { id: 'w9', name: 'Lanzagranadas', damage: 30, cost: 1500, fireRate: 1000, speed: 450, spread: 0.1, auto: false, color: '#aa00ff', magSize: 4, reloadTime: 3.0, type: 'grenade', explosive: true, radius: 80 },
    w10: { id: 'w10', name: 'Escopeta Pesada', damage: 8, cost: 1800, fireRate: 1100, speed: 550, spread: 0.35, auto: false, color: '#f00', magSize: 6, reloadTime: 2.5, type: 'shotgun', bullets: 7 },
    w11: { id: 'w11', name: 'Ametralladora', damage: 8, cost: 2200, fireRate: 80, speed: 850, spread: 0.12, auto: true, color: '#ffaa00', magSize: 80, reloadTime: 3.5, type: 'rifle' },
    w12: { id: 'w12', name: 'Rifle de Plasma', damage: 15, cost: 2600, fireRate: 130, speed: 1000, spread: 0.05, auto: true, color: '#00ffcc', magSize: 50, reloadTime: 2.0, type: 'rifle' },
    w13: { id: 'w13', name: 'Emisor de Ondas', damage: 5, cost: 3000, fireRate: 800, speed: 600, spread: 0.4, auto: false, color: '#00aaff', magSize: 10, reloadTime: 2.5, type: 'shotgun', bullets: 10 },
    w14: { id: 'w14', name: 'Arco Eléctrico', damage: 20, cost: 3500, fireRate: 200, speed: 1500, spread: 0.01, auto: true, color: '#ffff00', magSize: 30, reloadTime: 2.2, type: 'laser' },
    w15: { id: 'w15', name: 'Cañón Gauss', damage: 60, cost: 4000, fireRate: 1500, speed: 2000, spread: 0, auto: false, color: '#ff0055', magSize: 3, reloadTime: 3.0, type: 'sniper' },
    w16: { id: 'w16', name: 'Lanza Misiles', damage: 50, cost: 4500, fireRate: 1200, speed: 500, spread: 0.05, auto: false, color: '#ff0000', magSize: 4, reloadTime: 3.5, type: 'grenade', explosive: true, radius: 100 },
    w17: { id: 'w17', name: 'Láser Pesado', damage: 6, cost: 5000, fireRate: 30, speed: 1200, spread: 0.01, auto: true, color: '#ff00ff', magSize: 200, reloadTime: 3.0, type: 'laser' },
    w18: { id: 'w18', name: 'Desintegrador', damage: 35, cost: 6000, fireRate: 300, speed: 1100, spread: 0.02, auto: true, color: '#00ff00', magSize: 40, reloadTime: 2.5, type: 'rifle' },
    w19: { id: 'w19', name: 'Materia Oscura', damage: 100, cost: 10000, fireRate: 1500, speed: 600, spread: 0, auto: false, color: '#330066', magSize: 2, reloadTime: 4.0, type: 'grenade', explosive: true, radius: 150 },
    w20: { id: 'w20', name: 'Rayo de la Muerte', damage: 150, cost: 15000, fireRate: 1500, speed: 3000, spread: 0, auto: false, color: '#ffffff', magSize: 3, reloadTime: 3.5, type: 'sniper' },
    w21: { id: 'w21', name: 'Aniquilador Supremo', damage: 300, cost: 25000, fireRate: 2000, speed: 800, spread: 0, auto: false, color: '#ff0000', magSize: 1, reloadTime: 5.0, type: 'grenade', explosive: true, radius: 250 }
};

const ENEMY_CONFIGS = {
    basic: { color: '#ff4444', hp: 20, speed: 80, damage: 10, radius: 15, type: 'melee' },
    fast:  { color: '#ffaa00', hp: 12, speed: 150, damage: 6, radius: 12, type: 'melee' },
    tank:  { color: '#aa0000', hp: 50, speed: 40, damage: 15, radius: 18, type: 'ranged' },
    summoner: { color: '#8800ff', hp: 40, speed: 50, damage: 5, radius: 16, type: 'summoner' },
    healer: { color: '#00ff88', hp: 30, speed: 70, damage: 5, radius: 14, type: 'healer' },
    shielded: { color: '#0088ff', hp: 35, speed: 60, damage: 12, radius: 18, type: 'shielded' },
    boss:  { color: '#ff00ff', hp: 1000, speed: 90, damage: 20, radius: 25, type: 'boss' }
};

const MUTATIONS = [
    { id: 'hp', name: '+50% Vida Máxima', apply: p => { p.maxHp = Math.floor(p.maxHp * 1.5); p.hp += Math.floor(p.maxHp * 0.5); } },
    { id: 'dmg', name: '+15% Daño Fijo', apply: p => p.dmgMult += 0.15 },
    { id: 'dash', name: 'Dash Mejorado (-30% CD)', apply: p => p.dashCooldown *= 0.7 },
    { id: 'bounce', name: 'Balas Rebotadoras (x1)', apply: p => p.bounceCount = (p.bounceCount||0) + 1 },
    { id: 'shield', name: 'Aura Defensiva (-10% Daño)', apply: p => p.defenseMult = (p.defenseMult||1) * 0.9 },
    { id: 'speed', name: 'Pies Ligeros (+15% Vel)', apply: p => p.baseSpeed *= 1.15 }
];

let db = { users: {} }, currentUser = null, soundEnabled = true;
let isMobileMode = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth <= 1024;
document.body.classList.add(isMobileMode ? 'mobile-mode' : 'pc-mode');

function saveDB() { localStorage.setItem('NEON_ARMOR_DB', JSON.stringify(db)); }
function loadDB() {
    const data = localStorage.getItem('NEON_ARMOR_DB');
    if (data) db = JSON.parse(data);
    if (!db.users) db.users = {};
    updateLeaderboard();
}

function updateLeaderboard() {
    let arr = Object.keys(db.users).map(k => ({ user: k, score: db.users[k].highScore || 0 })).filter(x => x.score > 0);
    arr.sort((a, b) => b.score - a.score).slice(0, 10);
    
    const cPC = document.getElementById('lbContainerPC');
    const cMob = document.getElementById('lbContainerMobile');
    if(cPC) cPC.innerHTML = '';
    if(cMob) cMob.innerHTML = '';

    arr.forEach((entry, i) => {
        const html = `<span>${i+1}. ${entry.user}</span><span>${entry.score}</span>`;
        if(cPC) { let d = document.createElement('div'); d.className = 'lb-entry'; d.innerHTML = html; cPC.appendChild(d); }
        if(cMob) { let d = document.createElement('div'); d.className = 'lb-entry'; d.innerHTML = html; cMob.appendChild(d); }
    });
}

function checkHighscore(user, score) {
    if (score <= 0) return; let u = db.users[user];
    if (!u.highScore || score > u.highScore) { u.highScore = score; saveDB(); updateLeaderboard(); }
}

function randRange(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(randRange(min, max)); }
function distance(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

class AudioSystem {
    constructor() { this.ctx = null; this.initialized = false; this.bgmOsc = null; this.bgmGain = null; this.bgmInterval = null; this.step = 0; }
    init() { if (!this.initialized && soundEnabled) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.initialized = true; } }
    playTone(freq, type, duration, vol=0.1, slideFreq=null) {
        if (!soundEnabled || !this.ctx) return; if(this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration);
    }
    sfxShoot() { this.playTone(600, 'square', 0.1, 0.05, 200); }
    sfxHit() { this.playTone(150, 'sawtooth', 0.1, 0.1, 50); }
    sfxEnemyDeath() { this.playTone(100, 'square', 0.2, 0.1, 10); }
    sfxCoin() { this.playTone(800, 'sine', 0.1, 0.1, 1200); }
    sfxPortal() { this.playTone(400, 'sine', 0.8, 0.2, 800); }
    sfxBossSpawn() { this.playTone(100, 'sawtooth', 2.0, 0.3, 50); }
    sfxExplosion() { this.playTone(80, 'square', 0.3, 0.2, 20); }
    sfxReload() { this.playTone(800, 'triangle', 0.1, 0.05, 1200); }

    stopBGM() {
